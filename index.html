<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bulk Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>AI Bulk Trainer</h1>
    <p class="subtitle">Genera un plan básico de dieta y entrenamiento</p>

    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre">

    <label for="peso">Peso (kg)</label>
    <input type="number" id="peso" placeholder="Ej: 55">

    <label for="altura">Altura (cm)</label>
    <input type="number" id="altura" placeholder="Ej: 170">

    <label for="objetivo">Objetivo</label>
    <select id="objetivo">
      <option value="subir peso">Subir peso</option>
      <option value="bajar peso">Bajar peso</option>
      <option value="mantener">Mantener</option>
    </select>

    <label for="nivel">Nivel</label>
    <select id="nivel">
      <option value="principiante">Principiante</option>
      <option value="intermedio">Intermedio</option>
    </select>

    <label for="dias">Días de entrenamiento por semana</label>
    <input type="number" id="dias" placeholder="Ej: 4" min="1" max="7">

    <button id="generarBtn">Generar plan</button>

    <div id="resultado" class="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
