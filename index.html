<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bulk Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>AI Bulk Trainer</h1>
      <p class="subtitle">Genera un plan de entrenamiento, dieta y calorías orientativas con IA</p>

      <div class="form-grid">
        <div class="input-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" />
        </div>

        <div class="input-group">
          <label for="edad">Edad</label>
          <input type="number" id="edad" placeholder="Ej: 22" min="12" max="80" />
        </div>

        <div class="input-group">
          <label for="peso">Peso (kg)</label>
          <input type="number" id="peso" placeholder="Ej: 55" min="30" max="250" />
        </div>

        <div class="input-group">
          <label for="altura">Altura (cm)</label>
          <input type="number" id="altura" placeholder="Ej: 170" min="120" max="230" />
        </div>

        <div class="input-group">
          <label for="sexo">Sexo</label>
          <select id="sexo">
            <option value="hombre">Hombre</option>
            <option value="mujer">Mujer</option>
          </select>
        </div>

        <div class="input-group">
          <label for="objetivo">Objetivo</label>
          <select id="objetivo">
            <option value="subir peso">Subir peso</option>
            <option value="bajar peso">Bajar peso</option>
            <option value="mantener">Mantener</option>
          </select>
        </div>

        <div class="input-group">
          <label for="nivel">Nivel</label>
          <select id="nivel">
            <option value="principiante">Principiante</option>
            <option value="intermedio">Intermedio</option>
          </select>
        </div>

        <div class="input-group">
          <label for="dias">Días de entrenamiento / semana</label>
          <input type="number" id="dias" placeholder="Ej: 4" min="1" max="7" />
        </div>
      </div>

      <div class="buttons">
        <button id="generarBtn">Generar plan con IA</button>
        <button id="limpiarBtn" class="secondary">Limpiar</button>
        <button id="pdfBtn" class="secondary">Descargar PDF</button>
      </div>

      <div id="estado" class="estado"></div>
      <div id="resultado" class="resultado"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
